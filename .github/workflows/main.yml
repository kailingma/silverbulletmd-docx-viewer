name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can push back the built file
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plug
        run: npm run build

      - name: Commit built plug
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docxviewer.plug.js
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: rebuild plug [skip ci]"
          git push

      - name: Check for version tag in commit message
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # Match a leading v<semver>, e.g. v0.1.0 or v1.2.3-beta
          if echo "$MSG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            TAG=$(echo "$MSG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+[^ ]*')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ github.event.head_commit.message }}
          files: docxviewer.plug.js
